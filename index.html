<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Game</title>
    <link rel="icon" href="./font/globe-icon.png">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/indexMobile.css">
    <link rel="manifest" href="./manifest.json">
</head>

<body>



    <div class="mostHighContainer">


        <div class="welcome-sign">
            <h1>Welcome to Country Guessing Game</h1>
        </div>

        <div class="instructions">
            <h1>
                instructions: you will be given the first and last letter of a country's name. <br>
                it is your task to figure out which country it is and type it in the input box provided. <br>
                enjoy!
            </h1>
        </div>

        <div class="singleOrMulti">
            <div class="single">
                <h2 onClick="singlePlayer()">Single player</h2>
            </div>
            <div class="multi">
                <h2 onClick="multiPlayer()">Multi player</h2>
            </div>
        </div>

        <div class="settings">
            <div class="settings-btn" onclick="showSettings()">
                <h3>Settings</h3>
            </div>
        </div>


    </div>

    <div class="settings-window">
        <h3>These are the settings</h3>
        <button onclick="closeSettings()">Close</button>
    </div>




    <script>
        const mostHighContainer = document.querySelector('.mostHighContainer');
        const settingsBtn = document.querySelector('.settings-btn');
        const settingsWindow = document.querySelector('.settings-window');

        function singlePlayer() {
            window.location.href = './html/singleplayer.html';
        }

        function multiPlayer() {
            window.location.href = './html/multiplayer.html';
        }

        function showSettings() {
            settingsWindow.style.display = "block";
            mostHighContainer.style.display = "none";
        }

        function closeSettings() {
            settingsWindow.style.display = "none";
            mostHighContainer.style.display = "flex";
        }
    </script>

</body>

</html>
